services:
  db:
    image: postgres:17
    container_name: clans-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clans
    ports:
      - '5433:5432'
    volumes:
      - clans-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d clans']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  clans-pg-data:
